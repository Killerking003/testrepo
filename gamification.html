<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Quest</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a14;--bg-panel:#13132a;--bg-card:#1a1a38;--bg-input:#0e0e22;
  --border:rgba(90,90,180,0.2);--border-hi:rgba(200,170,60,0.45);
  --gold:#f0c040;--gold-dim:#a07820;--xp:#50aaff;--hp:#e05555;
  --green:#3dba5f;--red:#cf3636;--orange:#f08030;
  --text:#cccce0;--text-dim:#686888;--text-hi:#f0f0ff;
  --accent:#7755ee;--shadow:0 4px 24px rgba(0,0,0,.65);--r:8px;
}
html,body{height:100%}
body{
  background:var(--bg);
  background-image:radial-gradient(ellipse at 15% 15%,rgba(80,40,140,.18) 0%,transparent 55%),
                   radial-gradient(ellipse at 85% 85%,rgba(30,70,140,.18) 0%,transparent 55%);
  color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;
}
h1,h2,h3{color:var(--text-hi);letter-spacing:.4px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── BUTTONS ── */
.btn{
  background:linear-gradient(135deg,#5535b0,#7755ee);border:none;border-radius:var(--r);
  color:#fff;cursor:pointer;font-size:.9rem;font-family:inherit;font-weight:600;
  padding:.75rem 1.6rem;transition:all .2s;letter-spacing:.3px;display:inline-block;text-decoration:none;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(119,85,238,.4)}
.btn:active{transform:translateY(0)}
.btn-gold{background:linear-gradient(135deg,#b07818,#f0c040);color:#160e00}
.btn-gold:hover{box-shadow:0 6px 20px rgba(240,192,64,.4)}
.btn-red{background:linear-gradient(135deg,#9a1c1c,#cf3636)}
.btn-red:hover{box-shadow:0 6px 20px rgba(200,50,50,.4)}
.btn-green{background:linear-gradient(135deg,#1a6630,#3dba5f)}
.btn-green:hover{box-shadow:0 6px 20px rgba(60,186,95,.4)}
.btn-sm{font-size:.78rem;padding:.42rem .85rem}
.btn-full{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* ── INPUTS ── */
input[type=text],textarea,select{
  background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);padding:.7rem 1rem;font-size:.95rem;width:100%;
  transition:border-color .2s;font-family:inherit;
}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
.lbl{font-size:.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:.4rem}

/* ── PANELS ── */
.panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:1.4rem}
.pt{
  color:var(--gold);font-size:.78rem;text-transform:uppercase;letter-spacing:2px;
  margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.55rem;
}
.divider{height:1px;background:var(--border);margin:1rem 0}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-dim)}
.empty-icon{font-size:2.8rem;margin-bottom:.85rem}

/* ── BADGES ── */
.diff-badge{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;padding:.12rem .45rem;border-radius:4px}
.diff-easy{background:rgba(61,186,95,.14);color:#3dba5f}
.diff-medium{background:rgba(255,160,30,.14);color:#ffa020}
.diff-hard{background:rgba(200,60,60,.14);color:#c04040}
.status-badge{font-size:.72rem;padding:.15rem .55rem;border-radius:20px;font-weight:600}
.sb-pending{background:rgba(240,128,48,.18);color:#f08030;border:1px solid rgba(240,128,48,.35)}
.sb-approved{background:rgba(61,186,95,.14);color:#3dba5f;border:1px solid rgba(61,186,95,.3)}

/* ── NOTIFICATIONS ── */
#notifs{position:fixed;top:1rem;right:1rem;z-index:1000;display:flex;flex-direction:column;gap:.45rem;pointer-events:none}
.notif{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r);
  padding:.85rem 1.25rem;max-width:280px;box-shadow:var(--shadow);animation:slideIn .28s ease;
}
.notif.success{border-color:var(--green)}
.notif.error{border-color:var(--red)}
.notif.warning{border-color:var(--orange)}
.notif-title{font-weight:700;color:var(--text-hi);margin-bottom:.18rem;font-size:.88rem}
.notif-body{font-size:.78rem;color:var(--text-dim)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(110%);opacity:0}}
.notif.out{animation:slideOut .28s ease forwards}

/* ── MODAL ── */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem;
}
.modal{
  background:var(--bg-panel);border:1px solid var(--border-hi);border-radius:14px;
  padding:2rem;max-width:380px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.85);
}
.modal h2{color:var(--gold);text-align:center;margin-bottom:.75rem;font-size:1.4rem}
.modal-ico{font-size:4rem;text-align:center;margin-bottom:.75rem}
.modal-rwds{display:flex;justify-content:center;gap:2rem;margin:1rem 0}
.mrwd{display:flex;flex-direction:column;align-items:center;gap:.2rem}
.mrwd-val{font-size:1.6rem;font-weight:700}
.mrwd-lbl{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}

/* ── CREATION ── */
#creation-screen{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:2.5rem 1rem;gap:1.75rem}
.creation-title{text-align:center}
.creation-title h1{
  font-size:3.2rem;
  background:linear-gradient(135deg,var(--gold),#ff7e30);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.creation-title p{color:var(--text-dim);font-size:1.05rem;margin-top:.4rem}
.c-panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:1.75rem;width:100%;max-width:680px;box-shadow:var(--shadow)}
.c-panel h2{color:var(--gold);font-size:.82rem;text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:.65rem;margin-bottom:1.25rem}
.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem}
.av-opt{
  background:var(--bg-card);border:2px solid var(--border);border-radius:var(--r);
  padding:.9rem .4rem;text-align:center;cursor:pointer;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:.3rem;
}
.av-opt:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.av-opt.sel{border-color:var(--gold);background:rgba(240,192,64,.1);box-shadow:0 0 14px rgba(240,192,64,.2)}
.av-emoji{font-size:2.4rem;line-height:1}
.av-name{font-size:.72rem;color:var(--text-dim)}
.stats-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.stat-row{display:flex;align-items:center;gap:.7rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:.7rem .9rem}
.stat-ico{font-size:1.3rem;width:1.8rem;text-align:center}
.stat-lbl{font-size:.75rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.stat-ctrls{display:flex;align-items:center;gap:.45rem;margin-top:.2rem}
.s-btn{
  background:var(--bg-input);border:1px solid var(--border);border-radius:4px;
  color:var(--text);width:26px;height:26px;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.s-btn:hover:not(:disabled){background:var(--accent);border-color:var(--accent)}
.s-btn:disabled{opacity:.3;cursor:not-allowed}
.s-val{font-size:1.15rem;font-weight:700;color:var(--text-hi);width:1.8rem;text-align:center}
.pts-left{text-align:center;color:var(--gold);font-size:.88rem;margin-top:.65rem}

/* ── GAME: TOPBAR ── */
#main-app{display:flex;flex-direction:column;min-height:100vh}
.topbar{
  background:var(--bg-panel);border-bottom:1px solid var(--border);
  padding:.65rem 1.5rem;display:flex;align-items:center;gap:1.25rem;
  position:sticky;top:0;z-index:100;
}
.tb-avatar{font-size:1.75rem;line-height:1}
.tb-info h3{font-size:.97rem}
.tb-lvl{font-size:.72rem;color:var(--gold)}
.tb-right{display:flex;align-items:center;gap:1.25rem;margin-left:auto}
.tb-stats{display:flex;gap:1.25rem}
.tb-stat{display:flex;align-items:center;gap:.35rem;font-size:.88rem}
.xp-wrap{display:flex;flex-direction:column;gap:2px;min-width:140px}
.xp-lbl{font-size:.68rem;color:var(--text-dim)}
.xp-track{height:6px;background:var(--bg-input);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#1e58b8,#50aaff);border-radius:3px;transition:width .5s ease}
.admin-link{
  font-size:.75rem;color:var(--text-dim);text-decoration:none;
  border:1px solid var(--border);border-radius:20px;padding:.25rem .65rem;
  transition:all .18s;white-space:nowrap;
}
.admin-link:hover{color:var(--text);border-color:rgba(90,90,180,.5)}

/* Pending badge on quest tab */
.pending-dot{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--orange);color:#fff;border-radius:50%;
  width:18px;height:18px;font-size:.68rem;font-weight:700;margin-left:.35rem;
}

nav.nav{background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex}
.nav-btn{
  background:none;border:none;border-bottom:3px solid transparent;color:var(--text-dim);
  cursor:pointer;font-family:inherit;font-size:.88rem;padding:.8rem 1.35rem;
  transition:all .18s;display:flex;align-items:center;gap:.35rem;
}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.content{flex:1;padding:1.5rem;max-width:920px;margin:0 auto;width:100%}

/* ── GAME: CHARACTER SHEET ── */
.char-sheet{display:grid;grid-template-columns:290px 1fr;gap:1.5rem}
.char-portrait{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;
  padding:1.5rem;display:flex;flex-direction:column;align-items:center;gap:.85rem;
}
.char-av-big{
  font-size:4.5rem;line-height:1;background:var(--bg-card);border:2px solid var(--border-hi);
  border-radius:50%;width:110px;height:110px;display:flex;align-items:center;justify-content:center;
}
.char-name-big{font-size:1.45rem;font-weight:700;color:var(--text-hi);text-align:center}
.char-class-lbl{font-size:.8rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
.lvl-badge{background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:20px;color:#160e00;font-weight:700;padding:.28rem .9rem;font-size:.88rem}
.res-list{width:100%;display:flex;flex-direction:column;gap:.4rem}
.res-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border-radius:var(--r);padding:.55rem .8rem}
.res-lbl{display:flex;align-items:center;gap:.35rem;font-size:.82rem;color:var(--text-dim)}
.res-val{font-weight:700;color:var(--text-hi)}
.stat-bar-r{display:flex;align-items:center;gap:.65rem;margin-bottom:.65rem}
.stat-bar-lbl{display:flex;align-items:center;gap:.35rem;width:110px;font-size:.82rem}
.stat-bar-track{flex:1;height:8px;background:var(--bg-input);border-radius:4px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.stat-bar-num{font-weight:700;min-width:2.5rem;text-align:right;font-size:.88rem}
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-top:.85rem}
.equip-slot{
  background:var(--bg-card);border:1px dashed var(--border);border-radius:var(--r);
  padding:.9rem;display:flex;flex-direction:column;gap:.22rem;min-height:80px;
}
.equip-slot.has-item{border-style:solid;border-color:var(--border-hi)}
.equip-slot-lbl{font-size:.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.equip-item-name{font-size:.92rem;color:var(--text-hi);font-weight:600}
.equip-item-bonus{font-size:.74rem;color:var(--green)}
.equip-empty{font-size:.82rem;color:var(--text-dim);font-style:italic;margin-top:.25rem}
.bag-items{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.75rem}
.bag-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:.4rem .7rem;display:flex;align-items:center;gap:.45rem}
.prog-bar{height:10px;background:var(--bg-input);border-radius:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:5px;transition:width .5s ease}

/* ── GAME: TASKS ── */
.tasks-list{display:flex;flex-direction:column;gap:.65rem}
.task-card{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r);
  padding:1.1rem 1.2rem;display:flex;align-items:flex-start;gap:.85rem;transition:border-color .18s;
}
.task-card.approved{opacity:.52}
.task-card.approved .task-title{text-decoration:line-through;color:var(--text-dim)}
.task-card.pending-state{border-color:rgba(240,128,48,.3)}
.task-check{
  width:22px;height:22px;border:2px solid var(--border);border-radius:50%;cursor:pointer;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;margin-top:2px;
  font-size:.78rem;
}
.task-check:hover{border-color:var(--green)}
.task-check.chk{background:var(--green);border-color:var(--green);color:#fff}
.task-check.pending-chk{background:rgba(240,128,48,.2);border-color:var(--orange);color:var(--orange);cursor:default;font-size:.85rem}
.task-body{flex:1}
.task-title{font-size:.97rem;font-weight:600;color:var(--text-hi);margin-bottom:.25rem}
.task-desc{font-size:.82rem;color:var(--text-dim);margin-bottom:.5rem}
.task-rwds{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.rwd-badge{display:flex;align-items:center;gap:.22rem;font-size:.76rem;background:var(--bg-card);border-radius:20px;padding:.18rem .55rem}
.rwd-badge.gold{color:var(--gold)}
.rwd-badge.xp{color:var(--xp)}

/* ── GAME: SHOP ── */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.85rem;margin-top:.75rem}
.shop-item{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r);
  padding:1.1rem;display:flex;flex-direction:column;gap:.5rem;transition:all .18s;
}
.shop-item:hover:not(.owned){border-color:var(--gold-dim);transform:translateY(-2px)}
.shop-item.owned{border-color:var(--green);background:rgba(61,186,95,.04)}
.shop-ico{font-size:2.3rem;text-align:center}
.shop-name{font-weight:600;color:var(--text-hi);font-size:.92rem}
.shop-bonus{font-size:.76rem;color:var(--green);line-height:1.4}
.shop-price{display:flex;align-items:center;gap:.35rem;color:var(--gold);font-weight:700;margin-top:auto}

/* ── ADMIN VIEW ── */
#admin-view{min-height:100vh;display:flex;flex-direction:column}
.admin-topbar{
  background:#0f0f1e;border-bottom:1px solid rgba(200,50,50,.25);
  padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.admin-topbar-left{display:flex;align-items:center;gap:.75rem}
.admin-brand{font-size:1.1rem;font-weight:700;color:var(--text-hi)}
.admin-badge{
  background:rgba(200,50,50,.2);border:1px solid rgba(200,50,50,.4);
  color:#e06060;border-radius:4px;font-size:.7rem;font-weight:700;
  padding:.18rem .5rem;text-transform:uppercase;letter-spacing:1px;
}
.admin-content{flex:1;padding:1.5rem;max-width:860px;margin:0 auto;width:100%}
.admin-section{margin-bottom:2.25rem}
.admin-section-title{
  display:flex;align-items:center;gap:.6rem;font-size:1.05rem;font-weight:700;
  color:var(--text-hi);margin-bottom:1rem;
}

/* Pending approval card */
.pend-card{
  background:var(--bg-panel);border:1px solid rgba(240,128,48,.35);border-radius:var(--r);
  padding:1.1rem 1.2rem;margin-bottom:.65rem;
}
.pend-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.pend-title{font-size:1rem;font-weight:700;color:var(--text-hi);margin-bottom:.25rem}
.pend-desc{font-size:.82rem;color:var(--text-dim);margin-bottom:.5rem}
.pend-meta{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.pend-time{font-size:.72rem;color:var(--text-dim)}
.pend-actions{display:flex;gap:.5rem;flex-shrink:0;align-items:flex-start;margin-top:.1rem}

/* Admin task list */
.atk-card{
  background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r);
  padding:.9rem 1.1rem;display:flex;align-items:center;gap:.85rem;margin-bottom:.45rem;
}
.atk-info{flex:1}
.atk-name{font-weight:600;color:var(--text-hi)}
.atk-meta{font-size:.76rem;color:var(--text-dim);display:flex;gap:.65rem;margin-top:.2rem;flex-wrap:wrap}

/* Admin form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.fg{display:flex;flex-direction:column;gap:.35rem}
.fg.full{grid-column:1/-1}

/* Pending count badge in section title */
.count-badge{
  background:var(--orange);color:#fff;border-radius:20px;
  font-size:.72rem;font-weight:700;padding:.15rem .55rem;
}

/* Animations */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.float{animation:float 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 12px rgba(240,192,64,.3)}50%{box-shadow:0 0 24px rgba(240,192,64,.6)}}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pendingPulse{0%,100%{box-shadow:0 0 8px rgba(240,128,48,.2)}50%{box-shadow:0 0 18px rgba(240,128,48,.5)}}
.pend-pulse{animation:pendingPulse 2s ease-in-out infinite}

@media(max-width:680px){
  .char-sheet{grid-template-columns:1fr}
  .stats-grid-2{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .tb-stats{display:none}
  .topbar{padding:.55rem 1rem}
  .content{padding:1rem .85rem}
  .admin-content{padding:1rem .85rem}
}
</style>
</head>
<body>
<div id="notifs"></div>
<div id="app"></div>
<div id="modal-root"></div>
<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const AVATARS=[
  {id:1,emoji:'⚔️',name:'Harcos',cls:'Harcos'},
  {id:2,emoji:'🧙',name:'Varázsló',cls:'Varázsló'},
  {id:3,emoji:'🏹',name:'Íjász',cls:'Íjász'},
  {id:4,emoji:'🛡️',name:'Paladin',cls:'Paladin'},
  {id:5,emoji:'🗡️',name:'Tolvaj',cls:'Tolvaj'},
  {id:6,emoji:'🔮',name:'Boszorkány',cls:'Boszorkány'},
  {id:7,emoji:'🐉',name:'Sárkány Úr',cls:'Sárkány Úr'},
  {id:8,emoji:'💀',name:'Halállovag',cls:'Halállovag'},
];
const STAT_META={
  strength:{icon:'⚔️',label:'Erő',color:'#e06060'},
  speed:   {icon:'💨',label:'Sebesség',color:'#50aaff'},
  agility: {icon:'🎯',label:'Ügyesség',color:'#3dba5f'},
  health:  {icon:'❤️',label:'Életerő',color:'#e08040'},
};
const SHOP={
  weapons:[
    {id:'w1',name:'Rozsdás Tőr',  icon:'🗡️',price:50, bonuses:{strength:2},type:'weapon'},
    {id:'w2',name:'Acél Kard',    icon:'⚔️',price:150,bonuses:{strength:5},type:'weapon'},
    {id:'w3',name:'Harci Bárd',   icon:'🪓',price:300,bonuses:{strength:8,speed:-1},type:'weapon'},
    {id:'w4',name:'Mágikus Bot',  icon:'🔮',price:200,bonuses:{strength:4,agility:3},type:'weapon'},
    {id:'w5',name:'Legendás Kard',icon:'✨',price:600,bonuses:{strength:12,agility:4},type:'weapon'},
  ],
  armor:[
    {id:'a1',name:'Bőr Páncél',    icon:'🧥',price:75, bonuses:{health:3},type:'armor'},
    {id:'a2',name:'Láncing',       icon:'🛡️',price:200,bonuses:{health:6},type:'armor'},
    {id:'a3',name:'Lemezpáncél',   icon:'⚙️',price:400,bonuses:{health:10,speed:-2},type:'armor'},

function load(){

    if(!d)return;
    const p=JSON.parse(d);
    S.char=p.char||null;
    S.tasks=p.tasks||[];

// ═══════════════════════════════════════════════
// LEVELING
// ═══════════════════════════════════════════════
function calcLevel(xp){
  let lv=1,acc=0;
  while(true){const need=lv*100;if(acc+need>xp)break;acc+=need;lv++;if(lv>200)break;}
  return{level:lv,cur:xp-acc,need:lv*100};
}

// ═══════════════════════════════════════════════
// ITEM HELPERS
// ═══════════════════════════════════════════════
function allItems(){return[...SHOP.weapons,...SHOP.armor]}
function findItem(id){return allItems().find(i=>i.id===id)||null}
function equippedItem(slot){if(!S.char)return null;return S.char.eq[slot]?findItem(S.char.eq[slot]):null}
function effStat(stat){
  if(!S.char)return 0;
  let v=S.char.stats[stat]||0;
  ['weapon','armor'].forEach(slot=>{const it=equippedItem(slot);if(it&&it.bonuses[stat])v+=it.bonuses[stat];});
  return Math.max(0,v);
}
function owned(id){return S.char&&S.char.inv&&S.char.inv.includes(id)}
function isEquipped(id){return S.char&&Object.values(S.char.eq).includes(id)}
function fmtBon(b){
  return Object.entries(b).map(([k,v])=>{
    const m=STAT_META[k];const sign=v>0?'+':'';
    return`${m?m.icon:k} ${sign}${v} ${m?m.label:k}`;
  }).join('  ');
}
function fmtDate(ts){if(!ts)return'';return new Date(ts).toLocaleDateString('hu-HU',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function playerTaskCard(t){
  const d=DIFF[t.diff];
  const isActive=t.status==='active';
  const isPending=t.status==='pending';
  const isApproved=t.status==='approved';
  let checkHtml='';
  if(isActive){
    checkHtml=`<div class="task-check" data-done="${t.id}" title="Megcsináltam!"></div>`;
  }else if(isPending){
    checkHtml=`<div class="task-check pending-chk pend-pulse" title="Jóváhagyásra vár">⏳</div>`;
  }else{
    checkHtml=`<div class="task-check chk" style="cursor:default">✓</div>`;
  }
  return`<div class="task-card ${isApproved?'approved':''} ${isPending?'pending-state':''}">
  ${checkHtml}
  <div class="task-body">
    <div class="task-title">${esc(t.title)}</div>
    ${t.desc?`<div class="task-desc">${esc(t.desc)}</div>`:''}
    <div class="task-rwds">
      <span class="diff-badge diff-${t.diff}">${d.label}</span>
      <span class="rwd-badge gold">💰 ${t.gold}</span>
      <span class="rwd-badge xp">✨ ${t.xp} TP</span>
      ${isPending?`<span class="status-badge sb-pending">⏳ Jóváhagyásra vár</span>`:''}
      ${isApproved?`<span class="status-badge sb-approved">✅ Jóváhagyva · ${fmtDate(t.approvedAt)}</span>`:''}
    </div>
  </div>
</div>`;
}

          <div class="pend-actions">
            <button class="btn btn-green btn-sm" data-approve="${t.id}">✅ Jóváhagyás</button>
            <button class="btn btn-red btn-sm" data-reject="${t.id}">❌ Elutasítás</button>
          </div>
        </div>
      </div>`).join('')}
    </div>

    <!-- CREATE TASK -->
    <div class="admin-section">
      <div class="admin-section-title">➕ Új Feladat Létrehozása</div>
      <div class="panel">
        <div class="form-grid">
          <div class="fg full">
            <label class="lbl">Feladat neve *</label>
            <input type="text" id="af-title" value="${esc(S.af.title)}" placeholder="pl. 30 perc futás…" maxlength="100">
          </div>
          <div class="fg full">
            <label class="lbl">Leírás (opcionális)</label>
            <textarea id="af-desc" rows="2" placeholder="Részletes leírás…">${esc(S.af.desc)}</textarea>
          </div>
          <div class="fg">
            <label class="lbl">Nehézség</label>
            <select id="af-diff">
              <option value="easy"   ${S.af.diff==='easy'  ?'selected':''}>Könnyű — ${DIFF.easy.xp} TP, ${DIFF.easy.gold} arany</option>
              <option value="medium" ${S.af.diff==='medium'?'selected':''}>Közepes — ${DIFF.medium.xp} TP, ${DIFF.medium.gold} arany</option>
              <option value="hard"   ${S.af.diff==='hard'  ?'selected':''}>Nehéz — ${DIFF.hard.xp} TP, ${DIFF.hard.gold} arany</option>
            </select>
          </div>
          <div class="fg" style="justify-content:flex-end">
            <button class="btn btn-gold btn-full" id="af-add">➕ Feladat Hozzáadása</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ALL TASKS -->
    <div class="admin-section">
      <div class="admin-section-title">
        📝 Összes Feladat
        <span style="font-size:.8rem;font-weight:400;color:var(--text-dim)">${S.tasks.length} db</span>
      </div>
      ${allTasks.length===0?`<div class="empty-state"><div class="empty-icon">📝</div><div>Még nincs feladat.</div></div>`
      :allTasks.map(t=>`
      <div class="atk-card">
        <span style="font-size:1.4rem">${t.status==='approved'?'✅':t.status==='pending'?'⏳':'⬜'}</span>
        <div class="atk-info">
          <div class="atk-name">${esc(t.title)}</div>
          <div class="atk-meta">
            <span class="diff-${t.diff}">${DIFF[t.diff].label}</span>
            <span>💰 ${t.gold}</span>
            <span>✨ ${t.xp} TP</span>
            ${t.status==='approved'?`<span style="color:var(--green)">✅ Jóváhagyva</span>`:
              t.status==='pending'?`<span style="color:var(--orange)">⏳ Jóváhagyásra vár</span>`:
              `<span>Aktív</span>`}
          </div>
        </div>
        <button class="btn btn-red btn-sm" data-del="${t.id}">🗑️</button>
      </div>`).join('')}
    </div>

  </div>
</div>`;
}

function bindAdmin(){
  document.querySelectorAll('[data-approve]').forEach(el=>el.addEventListener('click',()=>approveTask(el.dataset.approve)));
  document.querySelectorAll('[data-reject]').forEach(el=>el.addEventListener('click',()=>rejectTask(el.dataset.reject)));
  document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',()=>delTask(el.dataset.del)));
  const ab=document.getElementById('af-add');
  if(ab){
    document.getElementById('af-title').addEventListener('input',e=>S.af.title=e.target.value);
    document.getElementById('af-desc').addEventListener('input',e=>S.af.desc=e.target.value);
    document.getElementById('af-diff').addEventListener('change',e=>S.af.diff=e.target.value);
    ab.addEventListener('click',addTask);
  }
}

// ═══════════════════════════════════════════════
// TASK ACTIONS
// ═══════════════════════════════════════════════

// Player submits task → pending (waiting admin)
function submitTask(id){
  const t=S.tasks.find(t=>t.id===id);
  if(!t||t.status!=='active')return;
  t.status='pending';
  t.pendingAt=Date.now();
  save();
  notify('Feladat beküldve!','Az admin jóváhagyásra vár… 🕐','success');
  render();
}

// Admin approves → give rewards
function approveTask(id){
  const t=S.tasks.find(t=>t.id===id);
  if(!t||t.status!=='pending')return;
  if(!S.char){notify('Nincs karakter','Még nem hoztak létre karaktert.','error');return;}
  const prev=calcLevel(S.char.xp).level;
  S.char.xp+=t.xp;
  S.char.gold+=t.gold;
  const next=calcLevel(S.char.xp).level;
  t.status='approved';
  t.approvedAt=Date.now();
  save();
  showRewardModal(t,prev,next);
}

// Admin rejects → back to active
function rejectTask(id){
  const t=S.tasks.find(t=>t.id===id);
  if(!t||t.status!=='pending')return;
  t.status='active';
  t.pendingAt=null;
  save();
  notify('Feladat elutasítva',`"${esc(t.title)}" visszakerült az aktív listára.`,'warning');
  render();
}

function addTask(){
  const title=(document.getElementById('af-title')?.value||'').trim();
  if(!title){notify('Hiba','Add meg a feladat nevét!','error');return;}
  const diff=document.getElementById('af-diff')?.value||'medium';
  const d=DIFF[diff];
  S.tasks.push({
    id:Date.now().toString(),title,
    desc:(document.getElementById('af-desc')?.value||'').trim(),
    diff,xp:d.xp,gold:d.gold,
    status:'active',pendingAt:null,approvedAt:null,createdAt:Date.now()
  });
  S.af.title='';S.af.desc='';
  save();notify('Feladat hozzáadva!',`"${title}" létrehozva.`,'success');render();
}

function delTask(id){
  const t=S.tasks.find(t=>t.id===id);
  if(!t)return;
  if(!confirm(`Törlöd a "${t.title}" feladatot?`))return;
  S.tasks=S.tasks.filter(t=>t.id!==id);save();render();
}

// ═══════════════════════════════════════════════
// SHOP ACTIONS
// ═══════════════════════════════════════════════
function buyItem(id){
  const it=findItem(id);if(!it)return;
  if(S.char.gold<it.price){notify('Nincs elég arany',`Szükséges: ${it.price} 💰`,'error');return;}
  S.char.gold-=it.price;
  if(!S.char.inv.includes(it.id))S.char.inv.push(it.id);
  const slot=it.type==='weapon'?'weapon':'armor';
  S.char.eq[slot]=it.id;
  save();notify('Vásárlás kész!',`${it.icon} ${it.name} megvásárolva!`,'success');render();
}
function equipItem(id){
  const it=findItem(id);if(!it)return;
  S.char.eq[it.type==='weapon'?'weapon':'armor']=it.id;save();render();
}
function unequipItem(id){
  const it=findItem(id);if(!it)return;
  S.char.eq[it.type==='weapon'?'weapon':'armor']=null;save();render();
}

// ═══════════════════════════════════════════════
// REWARD MODAL
// ═══════════════════════════════════════════════
function showRewardModal(task,prev,next){
  const lvUp=next>prev;
  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="modal-ov" id="mov">
  <div class="modal">
    <div class="modal-ico">${lvUp?'🎉':'⚔️'}</div>
    <h2>${lvUp?'🌟 SZINTLÉPÉS!':'Feladat Jóváhagyva!'}</h2>
    <p style="text-align:center;color:var(--text-dim);margin-bottom:.35rem">${esc(task.title)}</p>
    <div class="modal-rwds">
      <div class="mrwd"><div class="mrwd-val" style="color:var(--gold)">+${task.gold}</div><div class="mrwd-lbl">Arany</div></div>
      <div class="mrwd"><div class="mrwd-val" style="color:var(--xp)">+${task.xp}</div><div class="mrwd-lbl">Tapasztalat</div></div>
      ${lvUp?`<div class="mrwd"><div class="mrwd-val" style="color:var(--gold)">🌟 ${next}</div><div class="mrwd-lbl">Új szint!</div></div>`:''}
    </div>
    ${lvUp?`<p style="text-align:center;color:var(--gold);font-weight:700;margin-bottom:.85rem">${prev}. → ${next}. szint!</p>`:''}
    <button class="btn btn-full" id="m-close">Bezárás</button>
  </div>
</div>`;
  const close=()=>{root.innerHTML='';render()};
  document.getElementById('m-close').addEventListener('click',close);
  document.getElementById('mov').addEventListener('click',e=>{if(e.target===e.currentTarget)close()});
}

// ═══════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════
function notify(title,text,type='info'){
  const c=document.getElementById('notifs');
  const el=document.createElement('div');
  el.className=`notif ${type}`;
  el.innerHTML=`<div class="notif-title">${esc(title)}</div><div class="notif-body">${esc(text)}</div>`;
  c.appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300)},3500);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
load();render();
</script>
</body>
</html>
